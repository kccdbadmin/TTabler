<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TTabler — Editor</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<header>
  <a href="index.html" class="back-link" title="Back to library">←</a>
  <h1>T<span>T</span>abler</h1>
  <input id="tt-name" class="tt-name" placeholder="Untitled timetable" title="Timetable name" />
  <div class="spacer"></div>
  <button id="btn-save" class="primary">💾 Save</button>
  <button id="btn-generate" class="primary">⚡ Generate</button>
  <button id="btn-clear" class="ghost">Clear grid</button>
  <button id="btn-share">🔗 Share link</button>
  <button id="btn-export" class="ghost">Export</button>
  <button id="btn-import" class="ghost">Import</button>
  <input type="file" id="file-input" accept="application/json" style="display:none" />
</header>

<div class="main">
  <section class="workspace">
    <div class="toolbar">
      <div class="grp" id="data-buttons"></div>
      <span class="tb-sep"></span>
      <div class="grp">
        <button id="btn-overview" class="ghost" title="Toggle the all-classes overview">▦ All classes</button>
      </div>
      <div class="grp" id="view-controls">
        <span class="stat">View</span>
        <select id="view-mode">
          <option value="class">By Class</option>
          <option value="teacher">By Teacher</option>
          <option value="subject">By Subject</option>
          <option value="room">By Room</option>
        </select>
        <select id="view-entity"></select>
        <button id="btn-timeoff" class="ghost" title="Click cells to mark when this class/teacher/room is unavailable">🚫 Time-off</button>
      </div>
      <div class="spacer" style="flex:1"></div>
      <div class="grp">
        <span class="stat"><b id="stat-placed">0</b>/<b id="stat-total">0</b> placed</span>
        <span id="stat-conflicts" class="badge ok">No conflicts</span>
      </div>
    </div>
    <div class="grid-wrap" id="grid-wrap"></div>
    <div class="tray" id="tray">
      <div class="tray-title">
        <span>📥 Unplaced lessons — drag onto the grid</span>
        <span id="tray-count" class="stat"></span>
      </div>
      <div class="tray-cards" id="tray-cards"></div>
    </div>
  </section>
</div>

<!-- Off-canvas data editor: opened from the toolbar buttons, closed by ✕ /
     backdrop / Esc. Holds the same tabbed editors that used to be a fixed
     sidebar, so the grid gets the full screen width. -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <span class="drawer-title">Edit data</span>
    <button class="ghost" id="drawer-close" title="Close (Esc)">✕</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="tab-body" id="tab-body"></div>
</aside>

<div class="toast" id="toast"></div>

<!--
  Modules load in dependency order (plain <script>, shared global scope).
  Each file owns one concern — see the header comment in each.
  app.js is LAST: it wires buttons and boots the first render.
-->
<script src="js/util.js"></script>
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/constraints.js"></script>
<script src="js/generator.js"></script>
<script src="js/editors.js"></script>
<script src="js/grid.js"></script>
<script src="js/dnd.js"></script>
<script src="js/share.js"></script>
<script src="js/app.js"></script>
</body>
</html>
