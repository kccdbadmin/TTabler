<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TTabler — My Timetables</title>
<link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body>
<header>
  <h1>T<span>T</span>abler</h1>
  <span class="tagline">This is the result of a scarred DB admin making a timetable</span>
  <div class="spacer"></div>
  <button id="btn-new" class="primary">＋ New timetable</button>
  <button id="btn-sample" class="ghost">Load sample</button>
  <button id="btn-import" class="ghost">Import file</button>
  <button id="btn-import-asc" class="ghost">Import aSc XML</button>
  <input type="file" id="lib-file" accept="application/json" style="display:none" />
  <input type="file" id="lib-asc-file" accept=".xml,text/xml,application/xml" style="display:none" />
</header>

<div class="lib-scroll">
  <div class="lib-wrap">
    <div class="lib-head">
      <h2>My timetables</h2>
      <div class="lib-bar"></div>
    </div>
    <div id="lib"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Landing page only needs helpers, storage, the data model, and library.js -->
<script src="js/util.js?v=4"></script>
<script src="js/state.js?v=4"></script>
<script src="js/storage.js?v=4"></script>
<script src="js/asc-import.js?v=4"></script>
<script src="js/library.js?v=4"></script>
</body>
</html>
