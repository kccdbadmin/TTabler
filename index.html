<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TTabler — Web Timetabler</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2129;
    --panel-2: #222c37;
    --border: #2d3a47;
    --text: #e6edf3;
    --muted: #8b9aa8;
    --accent: #4f9cf9;
    --accent-d: #2b6fd6;
    --danger: #f97066;
    --ok: #3ddc97;
    --warn: #f6c453;
    --radius: 8px;
    --shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  button {
    font: inherit; cursor: pointer;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 12px; transition: .12s;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent-d); border-color: var(--accent); }
  button.primary:hover { background: var(--accent); }
  button.danger:hover { border-color: var(--danger); color: var(--danger); }
  button.ghost { background: transparent; }

  .main { display: flex; flex: 1; min-height: 0; }
  .sidebar {
    width: 340px; flex: 0 0 auto;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .tabs button {
    flex: 1 1 auto; border: none; border-radius: 0; background: transparent;
    color: var(--muted); padding: 9px 6px; font-size: 12px; border-bottom: 2px solid transparent;
  }
  .tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-body { flex: 1; overflow-y: auto; padding: 14px; }
  .tab-body h3 { margin: 0 0 4px; font-size: 13px; }
  .hint { color: var(--muted); font-size: 11.5px; margin: 0 0 12px; line-height: 1.5; }

  .row-item {
    display: flex; align-items: center; gap: 6px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; margin-bottom: 6px;
  }
  .row-item .swatch { width: 14px; height: 14px; border-radius: 3px; flex: 0 0 auto; }
  .row-item .label { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-item .sub { color: var(--muted); font-size: 11px; }
  .row-item .x { color: var(--muted); cursor: pointer; padding: 0 4px; font-size: 16px; line-height: 1; }
  .row-item .x:hover { color: var(--danger); }

  label.fld { display: block; font-size: 11px; color: var(--muted); margin: 8px 0 3px; }
  input, select, textarea {
    width: 100%; font: inherit; font-size: 13px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 7px 8px;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 8px; }
  .add-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-top: 6px; }
  .add-card button { width: 100%; margin-top: 10px; }
  input[type=color] { padding: 2px; height: 34px; }

  /* Workspace */
  .workspace { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel);
    flex: 0 0 auto; flex-wrap: wrap;
  }
  .toolbar .grp { display: flex; align-items: center; gap: 6px; }
  .toolbar select { width: auto; min-width: 150px; }
  .stat { font-size: 12px; color: var(--muted); }
  .stat b { color: var(--text); }
  .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: rgba(61,220,151,.15); color: var(--ok); }
  .badge.bad { background: rgba(249,112,102,.15); color: var(--danger); }

  .grid-wrap { flex: 1; overflow: auto; padding: 16px; }
  table.tt { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 640px; }
  table.tt th, table.tt td {
    border: 1px solid var(--border); padding: 0;
  }
  table.tt thead th {
    background: var(--panel); position: sticky; top: 0; z-index: 3;
    font-size: 12px; padding: 8px; color: var(--muted); font-weight: 600;
  }
  table.tt tbody th {
    background: var(--panel); position: sticky; left: 0; z-index: 2;
    font-size: 12px; padding: 8px 10px; text-align: left; min-width: 90px; color: var(--muted);
  }
  .cell { min-height: 58px; height: 58px; padding: 3px; position: relative; }
  .cell.drop-hover { background: rgba(79,156,249,.12); outline: 2px dashed var(--accent); outline-offset: -2px; }

  .card {
    height: 100%; border-radius: 6px; padding: 5px 7px;
    color: #0b0f14; font-size: 11.5px; cursor: grab; user-select: none;
    display: flex; flex-direction: column; justify-content: center; gap: 1px;
    box-shadow: 0 1px 3px rgba(0,0,0,.3); overflow: hidden;
  }
  .card:active { cursor: grabbing; }
  .card .c-sub { font-weight: 700; line-height: 1.15; }
  .card .c-meta { font-size: 10px; opacity: .82; line-height: 1.2; }
  .card.conflict { outline: 2px solid var(--danger); animation: pulse 1.1s infinite; }
  @keyframes pulse { 50% { outline-color: rgba(249,112,102,.4); } }
  .card.dragging { opacity: .4; }

  /* Unplaced tray */
  .tray {
    flex: 0 0 auto; border-top: 1px solid var(--border); background: var(--panel);
    padding: 8px 14px; max-height: 130px; overflow-y: auto;
  }
  .tray-title { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .tray-cards { display: flex; flex-wrap: wrap; gap: 6px; }
  .tray .card { height: auto; min-width: 96px; width: auto; cursor: grab; }
  .tray.drop-hover { outline: 2px dashed var(--accent); outline-offset: -4px; }

  .empty-state { color: var(--muted); text-align: center; padding: 40px; font-size: 13px; }
  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 16px; border-radius: 8px; box-shadow: var(--shadow); font-size: 13px;
    opacity: 0; pointer-events: none; transition: .2s; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  kbd { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 11px; }
  .pill-toggle { display: flex; gap: 4px; }
  .pill-toggle button { padding: 5px 10px; font-size: 12px; }
  .pill-toggle button.active { background: var(--accent-d); border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>T<span>T</span>abler</h1>
  <span class="tagline">drag-and-drop school timetabler</span>
  <div class="spacer"></div>
  <button id="btn-generate" class="primary">⚡ Generate</button>
  <button id="btn-clear" class="ghost">Clear grid</button>
  <button id="btn-share">🔗 Share link</button>
  <button id="btn-export" class="ghost">Export</button>
  <button id="btn-import" class="ghost">Import</button>
  <input type="file" id="file-input" accept="application/json" style="display:none" />
</header>

<div class="main">
  <aside class="sidebar">
    <div class="tabs" id="tabs"></div>
    <div class="tab-body" id="tab-body"></div>
  </aside>

  <section class="workspace">
    <div class="toolbar">
      <div class="grp">
        <span class="stat">View</span>
        <select id="view-mode">
          <option value="class">By Class</option>
          <option value="teacher">By Teacher</option>
          <option value="room">By Room</option>
        </select>
        <select id="view-entity"></select>
      </div>
      <div class="spacer" style="flex:1"></div>
      <div class="grp">
        <span class="stat"><b id="stat-placed">0</b>/<b id="stat-total">0</b> placed</span>
        <span id="stat-conflicts" class="badge ok">No conflicts</span>
      </div>
    </div>
    <div class="grid-wrap" id="grid-wrap"></div>
    <div class="tray" id="tray">
      <div class="tray-title">
        <span>📥 Unplaced lessons — drag onto the grid</span>
        <span id="tray-count" class="stat"></span>
      </div>
      <div class="tray-cards" id="tray-cards"></div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
//==================================================================
// TTabler — single-file school timetabler (aSc-style)
//==================================================================

// ---------- Utilities ----------
const $ = (s, r = document) => r.querySelector(s);
const uid = () => Math.random().toString(36).slice(2, 9);
const clone = (o) => JSON.parse(JSON.stringify(o));
function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 2200);
}
// Readable text colour for a given bg
function textOn(hex) {
  const c = hex.replace("#", "");
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  return (r*299 + g*587 + b*114)/1000 > 140 ? "#0b0f14" : "#ffffff";
}
const PALETTE = ["#4f9cf9","#f6c453","#3ddc97","#f97066","#b692f6","#fda4af","#7dd3fc","#fbbf24","#86efac","#fca5a5","#c4b5fd","#67e8f9"];

// ---------- State ----------
let state = null;

function demoState() {
  const days = ["Mon","Tue","Wed","Thu","Fri"];
  const periods = ["1","2","3","4","5","6"];
  const subjects = [
    { id:"s1", name:"Math",    color:"#4f9cf9" },
    { id:"s2", name:"English", color:"#3ddc97" },
    { id:"s3", name:"Science", color:"#f6c453" },
    { id:"s4", name:"History", color:"#b692f6" },
    { id:"s5", name:"P.E.",    color:"#f97066" },
    { id:"s6", name:"Art",     color:"#7dd3fc" },
  ];
  const teachers = [
    { id:"t1", name:"Mr Adams" }, { id:"t2", name:"Ms Brown" },
    { id:"t3", name:"Dr Chen" },  { id:"t4", name:"Mrs Diaz" },
    { id:"t5", name:"Mr Evans" },
  ];
  const classes = [
    { id:"c1", name:"7A" }, { id:"c2", name:"7B" }, { id:"c3", name:"8A" },
  ];
  const rooms = [
    { id:"r1", name:"Room 101" }, { id:"r2", name:"Room 102" },
    { id:"r3", name:"Lab" }, { id:"r4", name:"Gym" },
  ];
  // lessons: required teaching units. count = periods per week.
  const lessons = [
    { id:"l1", classId:"c1", subjectId:"s1", teacherId:"t1", roomId:"r1", count:4 },
    { id:"l2", classId:"c1", subjectId:"s2", teacherId:"t2", roomId:"r1", count:3 },
    { id:"l3", classId:"c1", subjectId:"s3", teacherId:"t3", roomId:"r3", count:3 },
    { id:"l4", classId:"c1", subjectId:"s4", teacherId:"t4", roomId:"r2", count:2 },
    { id:"l5", classId:"c1", subjectId:"s5", teacherId:"t5", roomId:"r4", count:2 },

    { id:"l6", classId:"c2", subjectId:"s1", teacherId:"t1", roomId:"r2", count:4 },
    { id:"l7", classId:"c2", subjectId:"s2", teacherId:"t2", roomId:"r2", count:3 },
    { id:"l8", classId:"c2", subjectId:"s3", teacherId:"t3", roomId:"r3", count:3 },
    { id:"l9", classId:"c2", subjectId:"s6", teacherId:"t4", roomId:"r1", count:2 },

    { id:"l10", classId:"c3", subjectId:"s1", teacherId:"t1", roomId:"r1", count:4 },
    { id:"l11", classId:"c3", subjectId:"s3", teacherId:"t3", roomId:"r3", count:3 },
    { id:"l12", classId:"c3", subjectId:"s4", teacherId:"t4", roomId:"r2", count:3 },
    { id:"l13", classId:"c3", subjectId:"s5", teacherId:"t5", roomId:"r4", count:2 },
  ];
  // assignments: placed cards. one per lesson-unit. slot = {day, period} or null (unplaced)
  const assignments = [];
  lessons.forEach(l => {
    for (let i = 0; i < l.count; i++) assignments.push({ id: uid(), lessonId: l.id, day: null, period: null });
  });
  return { days, periods, subjects, teachers, classes, rooms, lessons, assignments, ui: { mode:"class", entity:"c1" } };
}

// ---------- Lookups ----------
const byId = (arr, id) => arr.find(x => x.id === id);
function lessonInfo(lessonId) {
  const l = byId(state.lessons, lessonId);
  if (!l) return null;
  return {
    lesson: l,
    cls: byId(state.classes, l.classId),
    subject: byId(state.subjects, l.subjectId),
    teacher: byId(state.teachers, l.teacherId),
    room: byId(state.rooms, l.roomId),
  };
}

// ---------- Conflict detection ----------
// Returns Set of assignment ids that conflict (teacher/class/room double-booked in same slot).
function computeConflicts() {
  const conflicts = new Set();
  const slots = {}; // key day|period -> list of assignments
  for (const a of state.assignments) {
    if (a.day == null) continue;
    const k = a.day + "|" + a.period;
    (slots[k] = slots[k] || []).push(a);
  }
  for (const k in slots) {
    const list = slots[k];
    for (let i = 0; i < list.length; i++) {
      for (let j = i+1; j < list.length; j++) {
        const A = lessonInfo(list[i].lessonId), B = lessonInfo(list[j].lessonId);
        if (!A || !B) continue;
        const clash =
          (A.lesson.classId && A.lesson.classId === B.lesson.classId) ||
          (A.lesson.teacherId && A.lesson.teacherId === B.lesson.teacherId) ||
          (A.lesson.roomId && A.lesson.roomId === B.lesson.roomId);
        if (clash) { conflicts.add(list[i].id); conflicts.add(list[j].id); }
      }
    }
  }
  return conflicts;
}

// ---------- Auto-generator (greedy + randomised restarts) ----------
function generate() {
  const { days, periods } = state;
  const slotList = [];
  for (let d = 0; d < days.length; d++) for (let p = 0; p < periods.length; p++) slotList.push({ day:d, period:p });

  // Helper: is a slot free for this lesson w.r.t a placement map?
  function fits(placement, lesson, slot) {
    const key = slot.day + "|" + slot.period;
    const here = placement[key] || [];
    for (const other of here) {
      const ol = byId(state.lessons, other.lessonId);
      if (lesson.classId === ol.classId) return false;
      if (lesson.teacherId && lesson.teacherId === ol.teacherId) return false;
      if (lesson.roomId && lesson.roomId === ol.roomId) return false;
    }
    return true;
  }

  let best = null, bestPlaced = -1;
  const RESTARTS = 40;
  for (let r = 0; r < RESTARTS; r++) {
    const placement = {}; // key -> [assignment]
    const result = state.assignments.map(a => ({ ...a, day:null, period:null }));
    // schedule hardest first: more constrained lessons (bigger count) first, shuffle for variety
    const order = [...result].sort((a,b) => {
      const la = byId(state.lessons, a.lessonId), lb = byId(state.lessons, b.lessonId);
      return lb.count - la.count || Math.random() - .5;
    });
    let placed = 0;
    for (const a of order) {
      const lesson = byId(state.lessons, a.lessonId);
      // candidate slots, prefer days with fewer of this class's lessons (spread out)
      const cand = slotList.filter(s => fits(placement, lesson, s));
      if (!cand.length) continue;
      // soft: avoid same subject twice same day for the class
      const dayUsed = {};
      for (const k in placement) for (const o of placement[k]) {
        const ol = byId(state.lessons, o.lessonId);
        if (ol.classId === lesson.classId && ol.subjectId === lesson.subjectId)
          dayUsed[o.day] = (dayUsed[o.day]||0)+1;
      }
      cand.sort((s1,s2) => (dayUsed[s1.day]||0) - (dayUsed[s2.day]||0) || Math.random()-.5);
      const slot = cand[0];
      a.day = slot.day; a.period = slot.period;
      const key = slot.day + "|" + slot.period;
      (placement[key] = placement[key] || []).push(a);
      placed++;
    }
    if (placed > bestPlaced) { bestPlaced = placed; best = result; if (placed === result.length) break; }
  }
  state.assignments = best;
  save(); render();
  const total = state.assignments.length;
  toast(bestPlaced === total ? `✅ Generated — all ${total} lessons placed, no clashes`
                             : `⚠ Placed ${bestPlaced}/${total}. ${total-bestPlaced} couldn't fit — see tray.`);
}

//==================================================================
// SIDEBAR — data editors
//==================================================================
const TABS = ["Lessons","Classes","Teachers","Subjects","Rooms","Time"];
let activeTab = "Lessons";

function renderTabs() {
  const el = $("#tabs"); el.innerHTML = "";
  TABS.forEach(t => {
    const b = document.createElement("button");
    b.textContent = t; b.className = t === activeTab ? "active" : "";
    b.onclick = () => { activeTab = t; renderTabs(); renderTabBody(); };
    el.appendChild(b);
  });
}

function renderTabBody() {
  const el = $("#tab-body"); el.innerHTML = "";
  if (activeTab === "Lessons")  renderLessonsTab(el);
  if (activeTab === "Classes")  renderSimpleTab(el, "classes", "Classes", "e.g. 7A, 8B, Year 9");
  if (activeTab === "Teachers") renderSimpleTab(el, "teachers", "Teachers", "e.g. Mr Adams");
  if (activeTab === "Subjects") renderSubjectsTab(el);
  if (activeTab === "Rooms")    renderSimpleTab(el, "rooms", "Rooms", "e.g. Room 101, Lab, Gym");
  if (activeTab === "Time")     renderTimeTab(el);
}

function renderSimpleTab(el, key, title, placeholder) {
  el.innerHTML = `<h3>${title}</h3><p class="hint">Add, rename or remove. Removing one also removes lessons that use it.</p>`;
  state[key].forEach(item => {
    const row = document.createElement("div"); row.className = "row-item";
    row.innerHTML = `<input class="label" value="${escapeHtml(item.name)}" style="background:transparent;border:none;padding:2px 0" />
                     <span class="x">×</span>`;
    row.querySelector("input").onchange = e => { item.name = e.target.value; save(); refreshViews(); };
    row.querySelector(".x").onclick = () => { removeEntity(key, item.id); };
    el.appendChild(row);
  });
  const add = document.createElement("div"); add.className = "add-card";
  add.innerHTML = `<input id="new-name" placeholder="${placeholder}" /><button class="primary">+ Add</button>`;
  add.querySelector("button").onclick = () => {
    const v = add.querySelector("input").value.trim(); if (!v) return;
    state[key].push({ id: uid(), name: v }); save(); renderTabBody(); refreshViews();
  };
  add.querySelector("input").addEventListener("keydown", e => { if (e.key === "Enter") add.querySelector("button").click(); });
  el.appendChild(add);
}

function renderSubjectsTab(el) {
  el.innerHTML = `<h3>Subjects</h3><p class="hint">Colours show up on the timetable cards.</p>`;
  state.subjects.forEach(item => {
    const row = document.createElement("div"); row.className = "row-item";
    row.innerHTML = `<span class="swatch" style="background:${item.color}"></span>
      <input class="label" value="${escapeHtml(item.name)}" style="background:transparent;border:none;padding:2px 0" />
      <input type="color" value="${item.color}" style="width:30px;height:24px;padding:1px" />
      <span class="x">×</span>`;
    row.querySelector(".label").onchange = e => { item.name = e.target.value; save(); refreshViews(); };
    row.querySelector('input[type=color]').oninput = e => { item.color = e.target.value; row.querySelector(".swatch").style.background = e.target.value; save(); render(); };
    row.querySelector(".x").onclick = () => removeEntity("subjects", item.id);
    el.appendChild(row);
  });
  const add = document.createElement("div"); add.className = "add-card";
  add.innerHTML = `<input id="new-name" placeholder="e.g. Geography" /><button class="primary">+ Add subject</button>`;
  add.querySelector("button").onclick = () => {
    const v = add.querySelector("input").value.trim(); if (!v) return;
    state.subjects.push({ id: uid(), name: v, color: PALETTE[state.subjects.length % PALETTE.length] });
    save(); renderTabBody();
  };
  el.appendChild(add);
}

function renderLessonsTab(el) {
  el.innerHTML = `<h3>Lessons</h3><p class="hint">A lesson = a class studies a subject with a teacher, N periods/week. This is what gets scheduled.</p>`;
  if (!state.classes.length || !state.subjects.length) {
    el.innerHTML += `<p class="hint" style="color:var(--warn)">Add at least one class and subject first.</p>`;
  }
  state.lessons.forEach(l => {
    const info = lessonInfo(l.id);
    const row = document.createElement("div"); row.className = "row-item";
    row.innerHTML = `<span class="swatch" style="background:${info.subject?info.subject.color:'#888'}"></span>
      <span class="label">${info.cls?escapeHtml(info.cls.name):'?'} · ${info.subject?escapeHtml(info.subject.name):'?'}
        <span class="sub">${info.teacher?escapeHtml(info.teacher.name):'—'} · ${info.room?escapeHtml(info.room.name):'—'} · ${l.count}/wk</span></span>
      <span class="x">×</span>`;
    row.querySelector(".x").onclick = () => {
      state.lessons = state.lessons.filter(x => x.id !== l.id);
      state.assignments = state.assignments.filter(a => a.lessonId !== l.id);
      save(); renderTabBody(); render();
    };
    el.appendChild(row);
  });

  const add = document.createElement("div"); add.className = "add-card";
  const opt = (arr, blank) => (blank?`<option value="">${blank}</option>`:"") + arr.map(x => `<option value="${x.id}">${escapeHtml(x.name)}</option>`).join("");
  add.innerHTML = `
    <div class="form-grid">
      <div><label class="fld">Class</label><select id="nl-class">${opt(state.classes)}</select></div>
      <div><label class="fld">Subject</label><select id="nl-subject">${opt(state.subjects)}</select></div>
      <div><label class="fld">Teacher</label><select id="nl-teacher">${opt(state.teachers,"—")}</select></div>
      <div><label class="fld">Room</label><select id="nl-room">${opt(state.rooms,"—")}</select></div>
      <div><label class="fld">Periods / week</label><input id="nl-count" type="number" min="1" max="20" value="3" /></div>
    </div>
    <button class="primary">+ Add lesson</button>`;
  add.querySelector("button").onclick = () => {
    const classId = $("#nl-class").value, subjectId = $("#nl-subject").value;
    if (!classId || !subjectId) { toast("Pick a class and subject"); return; }
    const count = Math.max(1, parseInt($("#nl-count").value) || 1);
    const lesson = { id: uid(), classId, subjectId, teacherId: $("#nl-teacher").value || null, roomId: $("#nl-room").value || null, count };
    state.lessons.push(lesson);
    for (let i = 0; i < count; i++) state.assignments.push({ id: uid(), lessonId: lesson.id, day:null, period:null });
    save(); renderTabBody(); render();
  };
  el.appendChild(add);
}

function renderTimeTab(el) {
  el.innerHTML = `<h3>Days & periods</h3><p class="hint">Comma-separated. These define the grid columns (days) and rows (periods).</p>
    <label class="fld">Days</label><input id="t-days" value="${state.days.join(', ')}" />
    <label class="fld">Periods</label><input id="t-periods" value="${state.periods.join(', ')}" />
    <button class="primary" id="t-save" style="width:100%;margin-top:12px">Apply</button>`;
  $("#t-save").onclick = () => {
    const days = $("#t-days").value.split(",").map(s=>s.trim()).filter(Boolean);
    const periods = $("#t-periods").value.split(",").map(s=>s.trim()).filter(Boolean);
    if (!days.length || !periods.length) { toast("Need at least one day and period"); return; }
    // clamp existing placements to new bounds
    state.assignments.forEach(a => {
      if (a.day != null && a.day >= days.length) { a.day = null; a.period = null; }
      if (a.period != null && a.period >= periods.length) { a.day = null; a.period = null; }
    });
    state.days = days; state.periods = periods;
    save(); render(); toast("Time structure updated");
  };
}

function removeEntity(key, id) {
  state[key] = state[key].filter(x => x.id !== id);
  // cascade: remove lessons referencing it
  const field = { classes:"classId", teachers:"teacherId", subjects:"subjectId", rooms:"roomId" }[key];
  if (field) {
    const goneLessonIds = state.lessons.filter(l => l[field] === id).map(l => l.id);
    state.lessons = state.lessons.filter(l => l[field] !== id);
    state.assignments = state.assignments.filter(a => !goneLessonIds.includes(a.lessonId));
  }
  save(); renderTabBody(); render();
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

//==================================================================
// WORKSPACE — grid + drag & drop
//==================================================================
function entitiesForMode(mode) {
  return { class: state.classes, teacher: state.teachers, room: state.rooms }[mode] || [];
}
function refreshViews() { renderViewControls(); render(); }

function renderViewControls() {
  $("#view-mode").value = state.ui.mode;
  const sel = $("#view-entity"); sel.innerHTML = "";
  const list = entitiesForMode(state.ui.mode);
  list.forEach(e => { const o = document.createElement("option"); o.value = e.id; o.textContent = e.name; sel.appendChild(o); });
  if (!list.find(e => e.id === state.ui.entity)) state.ui.entity = list.length ? list[0].id : null;
  sel.value = state.ui.entity || "";
}

// which assignments are visible in the current view
function assignmentMatchesView(a) {
  const l = byId(state.lessons, a.lessonId); if (!l) return false;
  if (state.ui.mode === "class")   return l.classId === state.ui.entity;
  if (state.ui.mode === "teacher") return l.teacherId === state.ui.entity;
  if (state.ui.mode === "room")    return l.roomId === state.ui.entity;
  return false;
}

let conflicts = new Set();

function render() {
  conflicts = computeConflicts();
  renderViewControls();
  renderGrid();
  renderTray();
  renderStats();
}

function cardHTML(a) {
  const info = lessonInfo(a.lessonId); if (!info) return "";
  const bg = info.subject ? info.subject.color : "#888";
  const fg = textOn(bg);
  // what meta to show depends on view
  let line2;
  if (state.ui.mode === "class")        line2 = `${info.teacher?escapeHtml(info.teacher.name):'—'} · ${info.room?escapeHtml(info.room.name):'—'}`;
  else if (state.ui.mode === "teacher") line2 = `${info.cls?escapeHtml(info.cls.name):'—'} · ${info.room?escapeHtml(info.room.name):'—'}`;
  else                                  line2 = `${info.cls?escapeHtml(info.cls.name):'—'} · ${info.teacher?escapeHtml(info.teacher.name):'—'}`;
  const conf = conflicts.has(a.id) ? " conflict" : "";
  return `<div class="card${conf}" style="background:${bg};color:${fg}" draggable="true" data-aid="${a.id}" title="${conf?'⚠ Clash in this slot':''}">
    <span class="c-sub">${info.subject?escapeHtml(info.subject.name):'?'}</span>
    <span class="c-meta">${line2}</span>
  </div>`;
}

function renderGrid() {
  const wrap = $("#grid-wrap");
  const list = entitiesForMode(state.ui.mode);
  if (!list.length) { wrap.innerHTML = `<div class="empty-state">No ${state.ui.mode}s yet. Add some in the sidebar.</div>`; return; }
  if (!state.ui.entity) { wrap.innerHTML = `<div class="empty-state">Select one to view.</div>`; return; }

  // map slot -> assignment(s) visible in view
  const grid = {};
  state.assignments.forEach(a => {
    if (a.day == null) return;
    if (!assignmentMatchesView(a)) return;
    (grid[a.day + "|" + a.period] = grid[a.day + "|" + a.period] || []).push(a);
  });

  let html = `<table class="tt"><thead><tr><th></th>`;
  state.days.forEach(d => html += `<th>${escapeHtml(d)}</th>`);
  html += `</tr></thead><tbody>`;
  state.periods.forEach((p, pi) => {
    html += `<tr><th>${escapeHtml(p)}</th>`;
    state.days.forEach((d, di) => {
      const cards = (grid[di + "|" + pi] || []).map(cardHTML).join("");
      html += `<td class="cell" data-day="${di}" data-period="${pi}">${cards}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
  attachDnD();
}

function renderTray() {
  const cards = state.assignments.filter(a => a.day == null && assignmentMatchesView(a));
  $("#tray-cards").innerHTML = cards.map(cardHTML).join("");
  $("#tray-count").textContent = cards.length ? `${cards.length} for this view` : "all placed ✓";
  attachDnD();
}

function renderStats() {
  const placed = state.assignments.filter(a => a.day != null).length;
  const total = state.assignments.length;
  $("#stat-placed").textContent = placed;
  $("#stat-total").textContent = total;
  const badge = $("#stat-conflicts");
  if (conflicts.size === 0) { badge.className = "badge ok"; badge.textContent = "No conflicts"; }
  else { badge.className = "badge bad"; badge.textContent = `${conflicts.size} in conflict`; }
}

// ---------- Drag & drop ----------
let dragAid = null;
function attachDnD() {
  document.querySelectorAll(".card[draggable=true]").forEach(card => {
    card.addEventListener("dragstart", e => {
      dragAid = card.dataset.aid; card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", dragAid);
    });
    card.addEventListener("dragend", () => { card.classList.remove("dragging"); dragAid = null;
      document.querySelectorAll(".drop-hover").forEach(x=>x.classList.remove("drop-hover")); });
  });
  document.querySelectorAll(".cell").forEach(cell => {
    cell.addEventListener("dragover", e => { e.preventDefault(); cell.classList.add("drop-hover"); });
    cell.addEventListener("dragleave", () => cell.classList.remove("drop-hover"));
    cell.addEventListener("drop", e => {
      e.preventDefault(); cell.classList.remove("drop-hover");
      const aid = dragAid || e.dataTransfer.getData("text/plain"); if (!aid) return;
      const a = byId(state.assignments, aid); if (!a) return;
      a.day = parseInt(cell.dataset.day); a.period = parseInt(cell.dataset.period);
      save(); render();
    });
  });
  const tray = $("#tray");
  tray.ondragover = e => { e.preventDefault(); tray.classList.add("drop-hover"); };
  tray.ondragleave = () => tray.classList.remove("drop-hover");
  tray.ondrop = e => {
    e.preventDefault(); tray.classList.remove("drop-hover");
    const aid = dragAid || e.dataTransfer.getData("text/plain"); if (!aid) return;
    const a = byId(state.assignments, aid); if (!a) return;
    a.day = null; a.period = null; save(); render();
  };
}

//==================================================================
// Persistence + sharing
//==================================================================
const LS_KEY = "ttabler_state_v1";
function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
}
function load() {
  // priority: URL hash > localStorage > demo
  const fromUrl = readFromUrl();
  if (fromUrl) { state = fromUrl; toast("Loaded timetable from link"); save(); return; }
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { state = JSON.parse(raw); return; }
  } catch(e){}
  state = demoState();
}

// URL share: base64(JSON) in the hash. (Compact enough for typical school sizes.)
function encodeState() {
  const json = JSON.stringify(state);
  return btoa(unescape(encodeURIComponent(json)));
}
function readFromUrl() {
  const h = location.hash;
  if (!h.startsWith("#tt=")) return null;
  try { return JSON.parse(decodeURIComponent(escape(atob(h.slice(4))))); }
  catch(e){ return null; }
}
function shareLink() {
  const url = location.origin + location.pathname + "#tt=" + encodeState();
  navigator.clipboard?.writeText(url).then(
    () => toast("🔗 Link copied — anyone who opens it sees this timetable"),
    () => { prompt("Copy this link:", url); }
  );
  history.replaceState(null, "", "#tt=" + encodeState());
  if (url.length > 30000) toast("⚠ Link is large — Export to a file is more reliable for big schools");
}

function exportFile() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "timetable.json"; a.click(); URL.revokeObjectURL(a.href);
}
function importFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try { state = JSON.parse(reader.result); save(); boot(); toast("Imported"); }
    catch(e){ toast("Couldn't read that file"); }
  };
  reader.readAsText(file);
}

//==================================================================
// Wire up + boot
//==================================================================
function boot() {
  renderTabs(); renderTabBody(); renderViewControls(); render();
}

$("#btn-generate").onclick = generate;
$("#btn-clear").onclick = () => {
  if (!confirm("Move all cards back to the unplaced tray?")) return;
  state.assignments.forEach(a => { a.day = null; a.period = null; });
  save(); render(); toast("Grid cleared");
};
$("#btn-share").onclick = shareLink;
$("#btn-export").onclick = exportFile;
$("#btn-import").onclick = () => $("#file-input").click();
$("#file-input").onchange = e => { if (e.target.files[0]) importFile(e.target.files[0]); };
$("#view-mode").onchange = e => { state.ui.mode = e.target.value; const l = entitiesForMode(e.target.value); state.ui.entity = l.length?l[0].id:null; save(); render(); };
$("#view-entity").onchange = e => { state.ui.entity = e.target.value; save(); render(); };

load();
if (!state.ui) state.ui = { mode:"class", entity: state.classes[0]?.id || null };
boot();
</script>
</body>
</html>
